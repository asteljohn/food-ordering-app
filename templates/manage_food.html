<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Food</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

.header{
    background:#1e293b;
    color:white;
    padding:20px;
    text-align:center;
}

.header h1{
    margin-bottom:10px;
}

.menu-container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
    padding:30px;
}

.food-card{
    width:300px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.food-card:hover{
    transform:translateY(-5px);
}

.food-info{
    padding:25px;
    text-align:center;
}

.food-info h3{
    margin-bottom:15px;
    font-size:24px;
}

.price{
    color:#ff9800;
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
}

.btn-group{
    display:flex;
    justify-content:center;
    gap:10px;
}

.edit-btn{
    background:#f59e0b;
    color:white;
    text-decoration:none;
    padding:10px 15px;
    border-radius:8px;
}

.delete-btn{
    background:#dc2626;
    color:white;
    text-decoration:none;
    padding:10px 15px;
    border-radius:8px;
}

.back-btn{
    display:block;
    width:220px;
    margin:20px auto;
    text-align:center;
    text-decoration:none;
    background:#16a34a;
    color:white;
    padding:12px;
    border-radius:10px;
}

</style>

</head>
<body>

<div class="header">
    <h1>🍔 Manage Food Menu</h1>
    <p>Edit or Delete Food Items</p>
</div>

<div class="menu-container">

{% for food in foods %}

<div class="food-card">

    <div class="food-info">

        <h3>{{ food['food_name'] }}</h3>

        <div class="price">
            ₹{{ food['price'] }}
        </div>

        <div class="btn-group">

            <a href="/edit_food/{{ food['id'] }}"
               class="edit-btn">
               ✏ Edit
            </a>

            <a href="/delete_food/{{ food['id'] }}"
               class="delete-btn"
               onclick="return confirm('Delete this food item?')">
               🗑 Delete
            </a>

        </div>

    </div>

</div>

{% endfor %}

</div>

<a href="/admin_dashboard" class="back-btn">
    ← Back to Dashboard
</a>

</body>
</html>
