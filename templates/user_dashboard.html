<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Menu</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

/* Header */

.header{
    background:#ff9800;
    color:white;
    padding:20px;
    text-align:center;
}

.header h1{
    margin-bottom:10px;
}

/* Welcome Section */

.welcome{
    text-align:center;
    margin:30px;
}

.welcome h2{
    color:#333;
}

/* Food Cards */

.menu-container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
    padding:20px;
}

.food-card{
    width:300px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.food-card:hover{
    transform:translateY(-5px);
}

.food-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.food-info{
    padding:20px;
    text-align:center;
}

.food-info h3{
    margin-bottom:10px;
}

.price{
    color:#ff9800;
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.btn{
    background:#28a745;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    text-decoration:none;
    display:inline-block;
}

.btn:hover{
    background:#218838;
}
.food-info{
    padding:30px;
    text-align:center;
}

.food-info h3{
    font-size:24px;
    margin-bottom:15px;
}

.header{
    background:#ff9800;
    color:white;
    padding:20px;
    text-align:center;
    position:relative;
}

.logout-btn{
    position:absolute;
    top:20px;
    right:30px;
    text-decoration:none;
    background:#dc2626;
    color:white;
    padding:10px 20px;
    border-radius:8px;
    font-weight:bold;
}

.logout-btn:hover{
    background:#b91c1c;
}

</style>
</head>
<body>

<div class="header">

    <a href="/logout" class="logout-btn">
        Logout
    </a>

    <h1>🍔 Food Ordering System</h1>
    <p>Fresh & Delicious Food</p>

</div>

<div class="welcome">
    <h2>Welcome, {{name}}</h2>
    <p>Select your favorite food and place an order.</p>

    <br>

    <a href="/my_orders" class="btn">
        📦 My Orders
    </a>
</div>

<div class="menu-container">

{% for food in foods %}

    <div class="food-card">

        <div class="food-info">

            <h3>{{ food['food_name'] }}</h3>

            <div class="price">
                ₹{{ food['price'] }}
            </div>

            <a href="/order/{{ food['id'] }}" class="btn">
                Order Now
            </a>

        </div>

    </div>

{% endfor %}

</div>

</body>
</html>
