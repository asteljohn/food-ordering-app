<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    background:url('https://images.unsplash.com/photo-1513104890138-7c749659a591?w=1600')
    no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:400px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
    text-align:center;
}

.login-box h2{
    margin-bottom:25px;
    color:#ff9800;
}

.input-box{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.login-btn{
    width:100%;
    padding:12px;
    background:#ff9800;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
    margin-top:15px;
}

.login-btn:hover{
    background:#e68900;
}

.register-link{
    margin-top:20px;
    display:block;
    text-decoration:none;
    color:#333;
}

.register-link:hover{
    color:#ff9800;
}

</style>

</head>
<body>

<div class="overlay">

    <div class="login-box">

        <h2>🍔 User Login</h2>

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Enter Email"
                class="input-box"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                class="input-box"
                required
            >

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

        <a href="/register" class="register-link">
            Don't have an account? Register Here
        </a>

    </div>

</div>

</body>
</html>
