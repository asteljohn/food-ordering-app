<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Users</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

.header{
    background:#1e293b;
    color:white;
    padding:20px;
    text-align:center;
}

.header h1{
    margin-bottom:10px;
}

.users-container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
    padding:30px;
}

.user-card{
    width:320px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.user-card:hover{
    transform:translateY(-5px);
}

.user-info{
    padding:25px;
    text-align:center;
}

.user-info h3{
    margin-bottom:15px;
    color:#1e293b;
}

.user-info p{
    margin:10px 0;
    color:#555;
    font-size:16px;
}

.user-id{
    color:#16a34a;
    font-size:18px;
    font-weight:bold;
    margin-top:15px;
}

.back-btn{
    display:block;
    width:220px;
    margin:20px auto;
    text-align:center;
    text-decoration:none;
    background:#16a34a;
    color:white;
    padding:12px;
    border-radius:10px;
}

.back-btn:hover{
    background:#15803d;
}

</style>
</head>
<body>

<div class="header">
    <h1>👤 Registered Users</h1>
    <p>Manage All Registered Customers</p>
</div>

<div class="users-container">

{% for user in users %}

<div class="user-card">

    <div class="user-info">

        <h3>{{ user['name'] }}</h3>

        <p>
            <strong>Email:</strong><br>
            {{ user['email'] }}
        </p>

        <div class="user-id">
            User ID: {{ user['id'] }}
        </div>

    </div>

</div>

{% endfor %}

</div>

<a href="/admin_dashboard" class="back-btn">
    ← Back to Dashboard
</a>

</body>
</html>
