<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#1e293b,#0f172a);
    display:flex;
    justify-content:center;
    align-items:center;
}

.admin-box{
    width:420px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
    text-align:center;
}

.admin-box h2{
    color:#16a34a;
    margin-bottom:25px;
}

.admin-icon{
    font-size:60px;
    margin-bottom:15px;
}

.input-box{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.login-btn{
    width:100%;
    padding:12px;
    background:#16a34a;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
    margin-top:15px;
}

.login-btn:hover{
    background:#15803d;
}

.back-link{
    display:block;
    margin-top:20px;
    text-decoration:none;
    color:#555;
}

.back-link:hover{
    color:#16a34a;
}

</style>

</head>
<body>

<div class="admin-box">

    <div class="admin-icon">👨‍💼</div>

    <h2>Admin Portal</h2>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Admin Username"
            class="input-box"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            class="input-box"
            required
        >

        <button type="submit" class="login-btn">
            Login
        </button>

    </form>

    <a href="/" class="back-link">
        ← Back to Home
    </a>

</div>

</body>
</html>
